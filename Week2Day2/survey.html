<!DOCTYPE html>
<html>
  <head>
    <title>Quick Survey</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <h1>Quick Survey</h1>

    <form id="survey-form">
      <label for="fav-color">Favorite color?</label>
      <input id="fav-color" type="text" required>

      <label for="years-coding">Years you've been coding?</label>
      <input id="years-coding" type="number" min="0" required>

        <label for="fav-animal">Favorite Animal</label>
      <input id="fav-animal" type="text"  required>

      <button type="submit">See my summary</button>
    </form>

    <div id="summary"></div>

    <script src="survey.js"></script>
  </body>
</html>
